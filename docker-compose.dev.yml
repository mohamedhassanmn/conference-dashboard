services:
  frontend:
    ports:
      - "4000:4000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend:4500
    command: npm run dev

  backend:
    env_file:
      - ./backend/.env
    ports:
      - "4500:4500"
      - "9229:9229"
    volumes:
      - ./backend:/app
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: icpp2026_db
      DB_USER: icpp2026
      DB_PASSWORD: icpp2026password
    depends_on:
      - db
    command: npm run dev
