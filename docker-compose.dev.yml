services:
  backend:
    env_file:
      - ./backend/.env.development
    ports:
      - "4500:4500"
      - "9229:9229"
    volumes:
      - ./backend:/app
    environment:
      NODE_ENV: development
    command: npm run dev
    
  frontend:
    ports:
      - "4000:4000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend:4500
    command: npm run dev